<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DNA Mixer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  .controls { margin-bottom: 20px; }

  input, button, select {
    margin: 5px;
    padding: 8px 12px;
    font-size: 14px;
  }

  canvas {
    border: 2px solid white;
    max-width: 90vw;
    height: auto;
    background: black;
    cursor: pointer;
    touch-action: manipulation;
  }

  .footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<h1>DNA Mixer</h1>

<div class="controls">
  <label>Mother:
    <input type="file" id="motherInput" accept="image/*">
  </label>

  <label>Father:
    <input type="file" id="fatherInput" accept="image/*">
  </label>

  <br>

  <label>Strips:
    <input type="number" id="stripCount" value="6" min="2" max="40">
  </label>

  <label>Mode:
    <select id="modeSelect">
      <option value="horizontal">Horizontal</option>
      <option value="vertical">Vertical</option>
      <option value="both">Both (Grid)</option>
    </select>
  </label>

  <br>

  <button id="randomizeBtn">Randomize</button>
  <button id="resetMotherBtn">All Mother</button>
  <button id="resetFatherBtn">All Father</button>
</div>

<canvas id="canvas" width="600" height="600"></canvas>

<div class="footer">
  Tap a region to toggle parent DNA.
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const motherInput = document.getElementById("motherInput");
const fatherInput = document.getElementById("fatherInput");
const stripCountInput = document.getElementById("stripCount");
const modeSelect = document.getElementById("modeSelect");

const randomizeBtn = document.getElementById("randomizeBtn");
const resetMotherBtn = document.getElementById("resetMotherBtn");
const resetFatherBtn = document.getElementById("resetFatherBtn");

let motherImg = new Image();
let fatherImg = new Image();

let cells = [];
let count = 6;
let mode = "horizontal";

let imagesLoaded = 0;

// ---- Default Images ----
motherImg.src = "mother.jpg";
fatherImg.src = "father.jpg";

motherImg.onload = checkInitialLoad;
fatherImg.onload = checkInitialLoad;

function checkInitialLoad() {
  imagesLoaded++;
  if (imagesLoaded === 2) {
    initializeCells();
    redrawAll();
  }
}

// ---- Cover Fit ----
function getCoverFit(img) {
  const canvasRatio = canvas.width / canvas.height;
  const imgRatio = img.width / img.height;

  let sx, sy, sWidth, sHeight;

  if (imgRatio > canvasRatio) {
    sHeight = img.height;
    sWidth = img.height * canvasRatio;
    sx = (img.width - sWidth) / 2;
    sy = 0;
  } else {
    sWidth = img.width;
    sHeight = img.width / canvasRatio;
    sx = 0;
    sy = (img.height - sHeight) / 2;
  }

  return { sx, sy, sWidth, sHeight };
}

// ---- Initialize ----
function initializeCells() {
  count = parseInt(stripCountInput.value);
  cells = [];

  if (mode === "both") {
    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        cells.push({
          row: r,
          col: c,
          isMother: Math.random() > 0.5
        });
      }
    }
  } else {
    for (let i = 0; i < count; i++) {
      cells.push({
        index: i,
        isMother: Math.random() > 0.5
      });
    }
  }
}

// ---- Draw ----
function drawCell(cell) {
  const source = cell.isMother ? motherImg : fatherImg;
  const fit = getCoverFit(source);

  if (mode === "horizontal") {
    const h = canvas.height / count;
    const sHeight = fit.sHeight / count;
    const sy = fit.sy + cell.index * sHeight;

    ctx.drawImage(source,
      fit.sx, sy,
      fit.sWidth, sHeight,
      0, cell.index * h,
      canvas.width, h
    );
  }
  else if (mode === "vertical") {
    const w = canvas.width / count;
    const sWidth = fit.sWidth / count;
    const sx = fit.sx + cell.index * sWidth;

    ctx.drawImage(source,
      sx, fit.sy,
      sWidth, fit.sHeight,
      cell.index * w, 0,
      w, canvas.height
    );
  }
  else {
    const w = canvas.width / count;
    const h = canvas.height / count;

    const sWidth = fit.sWidth / count;
    const sHeight = fit.sHeight / count;

    const sx = fit.sx + cell.col * sWidth;
    const sy = fit.sy + cell.row * sHeight;

    ctx.drawImage(source,
      sx, sy,
      sWidth, sHeight,
      cell.col * w, cell.row * h,
      w, h
    );
  }
}

function redrawAll() {
  if (!motherImg.complete || !fatherImg.complete) return;
  cells.forEach(drawCell);
}

// ---- Pointer (Mobile Safe) ----
canvas.addEventListener("pointerdown", e => {
  const rect = canvas.getBoundingClientRect();

  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  let target;

  if (mode === "horizontal") {
    const h = canvas.height / count;
    target = cells[Math.floor(y / h)];
  }
  else if (mode === "vertical") {
    const w = canvas.width / count;
    target = cells[Math.floor(x / w)];
  }
  else {
    const w = canvas.width / count;
    const h = canvas.height / count;
    const col = Math.floor(x / w);
    const row = Math.floor(y / h);
    target = cells.find(c => c.row === row && c.col === col);
  }

  if (!target) return;

  target.isMother = !target.isMother;
  drawCell(target);
});

// ---- Controls ----
randomizeBtn.onclick = () => {
  cells.forEach(c => c.isMother = Math.random() > 0.5);
  redrawAll();
};

resetMotherBtn.onclick = () => {
  cells.forEach(c => c.isMother = true);
  redrawAll();
};

resetFatherBtn.onclick = () => {
  cells.forEach(c => c.isMother = false);
  redrawAll();
};

stripCountInput.onchange = () => {
  initializeCells();
  redrawAll();
};

modeSelect.onchange = () => {
  mode = modeSelect.value;
  initializeCells();
  redrawAll();
};

// ---- Upload Override ----
function loadImage(input, imgObj) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    imgObj.onload = () => {
      initializeCells();
      redrawAll();
    };
    imgObj.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

motherInput.onchange = () => loadImage(motherInput, motherImg);
fatherInput.onchange = () => loadImage(fatherInput, fatherImg);
</script>

</body>
</html>
