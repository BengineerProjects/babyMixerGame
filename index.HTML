<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Genetic Tile Mixer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    margin-bottom: 20px;
  }

  input, button {
    margin: 5px;
    padding: 8px 12px;
    font-size: 14px;
  }

  canvas {
    border: 2px solid white;
    max-width: 90vw;
    height: auto;
    background: black;
    cursor: pointer;
  }

  .footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<h1>Genetic Tile Mixer</h1>

<div class="controls">
  <label>Mother:
    <input type="file" id="motherInput" accept="image/*">
  </label>
  <label>Father:
    <input type="file" id="fatherInput" accept="image/*">
  </label>
  <br>
  <label>Grid Size:
    <input type="number" id="gridSize" value="6" min="2" max="20">
  </label>
  <button id="randomizeBtn">Randomize</button>
  <button id="resetMotherBtn">All Mother</button>
  <button id="resetFatherBtn">All Father</button>
</div>

<canvas id="canvas" width="500" height="500"></canvas>

<div class="footer">
  Click tiles to toggle DNA. You monsters.
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const motherInput = document.getElementById("motherInput");
const fatherInput = document.getElementById("fatherInput");
const gridSizeInput = document.getElementById("gridSize");

const randomizeBtn = document.getElementById("randomizeBtn");
const resetMotherBtn = document.getElementById("resetMotherBtn");
const resetFatherBtn = document.getElementById("resetFatherBtn");

let motherImg = new Image();
let fatherImg = new Image();

let tiles = [];
let rows = 6;
let cols = 6;

let tileWidth;
let tileHeight;

function loadImage(input, imgObj, callback) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    imgObj.onload = callback;
    imgObj.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initializeTiles() {
  rows = parseInt(gridSizeInput.value);
  cols = rows;

  tileWidth = canvas.width / cols;
  tileHeight = canvas.height / rows;

  tiles = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      tiles.push({
        row: r,
        col: c,
        isMother: Math.random() > 0.5
      });
    }
  }
}

function drawTile(tile) {
  const source = tile.isMother ? motherImg : fatherImg;

  const sx = tile.col * tileWidth;
  const sy = tile.row * tileHeight;

  ctx.drawImage(
    source,
    sx, sy,
    tileWidth, tileHeight,
    sx, sy,
    tileWidth, tileHeight
  );
}

function redrawAll() {
  if (!motherImg.src || !fatherImg.src) return;
  tiles.forEach(drawTile);
}

function toggleTile(row, col) {
  const tile = tiles.find(t => t.row === row && t.col === col);
  if (!tile) return;

  tile.isMother = !tile.isMother;
  drawTile(tile);
}

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const col = Math.floor(x / tileWidth);
  const row = Math.floor(y / tileHeight);

  toggleTile(row, col);
});

randomizeBtn.addEventListener("click", () => {
  tiles.forEach(tile => tile.isMother = Math.random() > 0.5);
  redrawAll();
});

resetMotherBtn.addEventListener("click", () => {
  tiles.forEach(tile => tile.isMother = true);
  redrawAll();
});

resetFatherBtn.addEventListener("click", () => {
  tiles.forEach(tile => tile.isMother = false);
  redrawAll();
});

gridSizeInput.addEventListener("change", () => {
  initializeTiles();
  redrawAll();
});

motherInput.addEventListener("change", () => {
  loadImage(motherInput, motherImg, () => {
    if (fatherImg.src) {
      initializeTiles();
      redrawAll();
    }
  });
});

fatherInput.addEventListener("change", () => {
  loadImage(fatherInput, fatherImg, () => {
    if (motherImg.src) {
      initializeTiles();
      redrawAll();
    }
  });
});
</script>

</body>
</html>
